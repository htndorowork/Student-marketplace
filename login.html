<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Student Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">student<span>market</span> 🎓</a>
    <div class="nav-links"><a href="index.html">← Browse</a></div>
  </nav>
  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
        <button class="auth-tab" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN -->
      <div id="login-form">
        <h2 class="auth-title">Welcome back! 👋</h2>
        <p class="auth-sub">Sign in to your Student Marketplace account</p>
        <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com"/></div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="login-password" placeholder="••••••••"/>
            <button class="pw-toggle" onclick="togglePw('login-password',this)" type="button">👁</button>
          </div>
        </div>
        <div class="auth-error" id="login-error"></div>
        <button class="btn-primary" id="btn-login">Sign In 🚀</button>
      </div>

      <!-- SIGNUP -->
      <div id="signup-form" style="display:none">
        <h2 class="auth-title">Join Student Marketplace! 🎉</h2>
        <p class="auth-sub">Create your free account</p>
        <div class="form-group"><label>I want to</label>
          <div class="role-selector">
            <button class="role-btn active" id="role-buyer" onclick="selectRole('buyer')">🛍️ Buy</button>
            <button class="role-btn" id="role-seller" onclick="selectRole('seller')">💼 Sell</button>
          </div>
        </div>
        <div class="form-group"><label>Full Name *</label><input type="text" id="signup-name" placeholder="Thabo Mokoena"/></div>
        <div class="form-group"><label>WhatsApp Number *</label><input type="text" id="signup-whatsapp" placeholder="0812345678"/></div>
        <div class="form-group seller-only" style="display:none"><label>Residence *</label><input type="text" id="signup-residence" placeholder="e.g. Heroes Residence"/></div>
        <div class="form-group"><label>Email *</label><input type="email" id="signup-email" placeholder="your@email.com"/></div>
        <div class="form-group">
          <label>Password *</label>
          <div class="pw-wrap">
            <input type="password" id="signup-password" placeholder="••••••••"/>
            <button class="pw-toggle" onclick="togglePw('signup-password',this)" type="button">👁</button>
          </div>
        </div>
        <div class="auth-error" id="signup-error"></div>
        <button class="btn-primary" id="btn-signup">Create Account 🎓</button>
      </div>
    </div>
  </main>

  <script>
    let selectedRole = 'buyer';
    function showTab(t){
      document.getElementById('login-form').style.display=t==='login'?'block':'none';
      document.getElementById('signup-form').style.display=t==='signup'?'block':'none';
      document.getElementById('tab-login').classList.toggle('active',t==='login');
      document.getElementById('tab-signup').classList.toggle('active',t==='signup');
    }
    function selectRole(r){
      selectedRole=r;
      document.getElementById('role-buyer').classList.toggle('active',r==='buyer');
      document.getElementById('role-seller').classList.toggle('active',r==='seller');
      document.querySelectorAll('.seller-only').forEach(el=>el.style.display=r==='seller'?'block':'none');
    }
    function togglePw(id,btn){
      const inp=document.getElementById(id);
      if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
      else{inp.type='password';btn.textContent='👁';}
    }
    window.showTab=showTab;window.selectRole=selectRole;window.togglePw=togglePw;
  </script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://kqsqtasykdtpdrkqyaxp.supabase.co','sb_publishable_8S5WkeUpuQYSLWhIbUJr1w_VrwFatlZ');

    document.getElementById('btn-login').onclick=async()=>{
      const email=document.getElementById('login-email').value;
      const password=document.getElementById('login-password').value;
      const err=document.getElementById('login-error');
      err.style.color='#71717a';err.textContent='';
      const {error}=await supabase.auth.signInWithPassword({email,password});
      if(error){err.textContent='❌ '+error.message;return;}
      window.location.href='profile.html';
    };

    document.getElementById('btn-signup').onclick=async()=>{
      const name=document.getElementById('signup-name').value.trim();
      const wa=document.getElementById('signup-whatsapp').value.trim();
      const res=document.getElementById('signup-residence').value.trim();
      const email=document.getElementById('signup-email').value.trim();
      const password=document.getElementById('signup-password').value;
      const err=document.getElementById('signup-error');
      const role=window.selectedRole||'buyer';
      err.style.color='#71717a';err.textContent='';
      if(!name||!wa||!email||!password){err.textContent='❌ Please fill in all fields';return;}
      if(role==='seller'&&!res){err.textContent='❌ Sellers must enter their residence';return;}
      const {data,error}=await supabase.auth.signUp({email,password});
      if(error){err.textContent='❌ '+error.message;return;}
      if(data.user){
        await supabase.from('profiles').upsert({id:data.user.id,full_name:name,whatsapp:wa,residence:res||null,role});
      }
      err.style.color='#2e7d32';
      err.textContent='✅ Account created! Sign in now.';
      setTimeout(()=>showTab('login'),1500);
    };
  </script>
</body>
</html>
