<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receipt — Student Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .receipt-wrap{max-width:480px;margin:32px auto;padding:0 20px}
    .receipt{background:#fff;border:2px solid #f0f0f0;border-radius:18px;padding:28px}
    .receipt-header{text-align:center;border-bottom:2px dashed #eee;padding-bottom:16px;margin-bottom:16px}
    .receipt-logo{font-weight:900;font-size:20px}
    .receipt-logo span{color:#7c3aed}
    .receipt-row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 0;color:#444;font-weight:600}
    .receipt-row strong{color:#111;font-weight:800}
    .receipt-total{border-top:2px dashed #eee;margin-top:10px;padding-top:12px;display:flex;justify-content:space-between;font-size:17px;font-weight:900}
    .print-btn{display:block;width:100%;margin-top:18px;background:#7c3aed;color:#fff;border:none;padding:12px;border-radius:12px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer}
    @media print { .nav,.footer,.print-btn{display:none!important} .receipt-wrap{margin:0} }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">student<span>market</span> 🎓</a>
    <div class="nav-links"><a href="index.html">Browse</a></div>
  </nav>

  <div class="receipt-wrap">
    <div class="receipt" id="receipt-body"><p class="loading-msg">Loading receipt... ⏳</p></div>
    <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://kqsqtasykdtpdrkqyaxp.supabase.co','sb_publishable_8S5WkeUpuQYSLWhIbUJr1w_VrwFatlZ');

    const orderId = new URLSearchParams(location.search).get('order');
    const body = document.getElementById('receipt-body');

    const {data:{user}} = await supabase.auth.getUser();
    if (!user) { body.innerHTML = '<p class="loading-msg">Please sign in to view this receipt.</p>'; }
    else if (!orderId) { body.innerHTML = '<p class="loading-msg">No order specified.</p>'; }
    else {
      const {data:o} = await supabase.from('orders').select('*,listings(title,price,discount_percent,delivery_fee),profiles!orders_seller_id_fkey(full_name,store_name)').eq('id',orderId).single();
      if (!o || (o.buyer_id!==user.id && o.seller_id!==user.id)) {
        body.innerHTML = '<p class="loading-msg">Receipt not found.</p>';
      } else {
        const price = o.listings?.price || 0;
        const disc = o.listings?.discount_percent || 0;
        const unitPrice = disc>0 ? Math.round(price*(1-disc/100)) : price;
        const deliveryFee = o.listings?.delivery_fee || 0;
        const subtotal = unitPrice * o.quantity;
        const total = subtotal + deliveryFee;
        body.innerHTML =
          '<div class="receipt-header"><div class="receipt-logo">student<span>market</span> 🎓</div>'+
          '<div style="font-size:12px;color:#aaa;font-weight:700;margin-top:4px">Order Receipt</div></div>'+
          '<div class="receipt-row"><span>Order ID</span><strong>'+o.id.slice(0,8)+'</strong></div>'+
          '<div class="receipt-row"><span>Date</span><strong>'+new Date(o.created_at).toLocaleDateString('en-ZA')+'</strong></div>'+
          '<div class="receipt-row"><span>Seller</span><strong>'+(o.profiles?.store_name||o.profiles?.full_name||'Seller')+'</strong></div>'+
          '<div class="receipt-row"><span>Buyer</span><strong>'+(o.buyer_name||'Buyer')+'</strong></div>'+
          '<div class="receipt-row"><span>Item</span><strong>'+(o.listings?.title||'Item')+'</strong></div>'+
          '<div class="receipt-row"><span>Quantity</span><strong>'+o.quantity+'</strong></div>'+
          '<div class="receipt-row"><span>Unit price</span><strong>R'+unitPrice+'</strong></div>'+
          (deliveryFee>0?'<div class="receipt-row"><span>Delivery fee</span><strong>R'+deliveryFee+'</strong></div>':'')+
          '<div class="receipt-total"><span>Total</span><span>R'+total+'</span></div>'+
          '<div style="text-align:center;font-size:11px;color:#aaa;font-weight:600;margin-top:16px">Payment arranged directly between buyer and seller. This receipt confirms the order details recorded on Student Marketplace.</div>';
      }
    }
  </script>
</body>
</html>
